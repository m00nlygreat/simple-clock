<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101820">
    <meta name="description" content="오프라인에서도 사용할 수 있는 심플 PWA 스톱워치">
    <title>Simple Clock Stopwatch</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.svg">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="stopwatch" aria-label="스톱워치">
      <time class="time-main" id="elapsed-time" aria-live="polite">00:00.00</time>
      <div class="controls" aria-label="스톱워치 조작">
        <button class="button secondary" id="reset-button" type="button">초기화</button>
        <button class="button primary" id="toggle-button" type="button">시작</button>
      </div>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
