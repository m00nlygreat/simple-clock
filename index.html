<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101820">
    <meta name="description" content="오프라인에서도 사용할 수 있는 심플 PWA 스톱워치">
    <title>Simple Clock Stopwatch</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.svg">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="stopwatch" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">PWA Stopwatch</p>
            <h1 id="app-title">Simple Clock</h1>
          </div>
          <span class="status-pill" id="install-status">오프라인 가능</span>
        </header>

        <div class="time-panel" aria-live="polite">
          <span class="time-main" id="elapsed-time">00:00.00</span>
          <span class="time-sub" id="elapsed-hours">0시간 경과</span>
        </div>

        <div class="controls" aria-label="스톱워치 조작">
          <button class="button secondary" id="reset-button" type="button">초기화</button>
          <button class="button primary" id="toggle-button" type="button">시작</button>
          <button class="button secondary" id="lap-button" type="button" disabled>랩</button>
        </div>

        <section class="laps" aria-labelledby="laps-title">
          <div class="laps-header">
            <h2 id="laps-title">랩 기록</h2>
            <button class="text-button" id="clear-laps-button" type="button" disabled>지우기</button>
          </div>
          <ol class="lap-list" id="lap-list">
            <li class="empty-state">아직 기록된 랩이 없습니다.</li>
          </ol>
        </section>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
